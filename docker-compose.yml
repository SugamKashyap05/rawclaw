# RawClaw Infrastructure Services
# Provides: Redis (session/queue), ChromaDB (vector memory)
#
# Port map:
#   Redis    → localhost:6379
#   ChromaDB → localhost:8010  (agent reads CHROMA_PORT=8010)
#
# Run: docker compose up -d

services:
  redis:
    image: redis:7-alpine
    container_name: rawclaw-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  chromadb:
    image: chromadb/chroma:latest
    container_name: rawclaw-chromadb
    restart: unless-stopped
    ports:
      - "8010:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    healthcheck:
      test: ["CMD-SHELL", "perl -MIO::Socket::INET -e 'exit !IO::Socket::INET->new(PeerAddr => \"127.0.0.1\", PeerPort => 8000, Timeout => 1)'"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis_data:
    driver: local
  chroma_data:
    driver: local
